name: Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2  # needed for ARCHITECTURE.md freshness check

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 2.0.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: content-queue-backend/.venv
        key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      working-directory: ./content-queue-backend
      run: poetry install --with dev

    - name: Run Ruff (linting)
      working-directory: ./content-queue-backend
      run: poetry run ruff check app/

    - name: ARCHITECTURE.md freshness check
      run: |
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD 2>/dev/null || echo "")
        APP_CHANGED=$(echo "$CHANGED" | grep -E "^(content-queue-backend/app|frontend/components|frontend/app)" || true)
        ARCH_CHANGED=$(echo "$CHANGED" | grep "ARCHITECTURE.md" || true)
        SKIP_FLAG=$(git log -1 --pretty=%s | grep "\[skip-arch\]" || true)
        if [ -n "$APP_CHANGED" ] && [ -z "$ARCH_CHANGED" ] && [ -z "$SKIP_FLAG" ]; then
          echo "ERROR: Code files changed but ARCHITECTURE.md was not updated."
          echo ""
          echo "Changed app files:"
          echo "$APP_CHANGED"
          echo ""
          echo "Update ARCHITECTURE.md to reflect the change, or add [skip-arch] to"
          echo "the commit message for refactors that don't affect architecture."
          exit 1
        fi
        echo "✓ ARCHITECTURE.md freshness check passed"

    - name: Alembic single-head check
      working-directory: ./content-queue-backend
      run: |
        HEAD_COUNT=$(poetry run alembic heads 2>/dev/null | grep -c "(head)" || true)
        if [ "$HEAD_COUNT" -ne 1 ]; then
          echo "ERROR: alembic has $HEAD_COUNT heads (expected 1)."
          echo "Fix: poetry run alembic merge heads -m 'merge_heads'"
          exit 1
        fi
        echo "✓ alembic single head: OK"

    - name: poetry.lock consistency check
      working-directory: ./content-queue-backend
      run: poetry check --lock

    - name: Set up PostgreSQL with pgvector
      run: |
        docker run -d \
          --name postgres-pgvector \
          -e POSTGRES_USER=postgres \
          -e POSTGRES_PASSWORD=postgres \
          -e POSTGRES_DB=content_queue_test \
          -p 5432:5432 \
          pgvector/pgvector:pg16
        for i in {1..30}; do
          if docker exec postgres-pgvector pg_isready -U postgres; then
            break
          fi
          echo "Waiting for PostgreSQL..."
          sleep 1
        done

    - name: Enable pgvector extension
      run: |
        docker exec postgres-pgvector psql -U postgres -d content_queue_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

    - name: App import smoke test (catches startup errors before uvicorn)
      working-directory: ./content-queue-backend
      run: poetry run python -c "import app.main; print('✓ app.main imports OK')"
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/content_queue_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key-for-ci

    - name: Golden-path tests (must pass before full suite)
      working-directory: ./content-queue-backend
      run: poetry run pytest tests/test_golden_paths.py -v --tb=short
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/content_queue_test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/content_queue_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key-for-ci

    - name: Full test suite
      working-directory: ./content-queue-backend
      run: poetry run pytest tests/ -v --tb=short --ignore=tests/evals
      env:
        TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/content_queue_test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/content_queue_test
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: test-secret-key-for-ci
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
