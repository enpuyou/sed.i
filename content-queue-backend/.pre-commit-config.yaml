repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: ^frontend/public/clips/

  # Run tests before committing
  - repo: local
    hooks:
      - id: pytest
        name: Run pytest
        entry: ./scripts/run_backend_pytest_precommit.sh
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]
