[phases.setup]
nixPkgs = ["python311", "poetry"]

[phases.install]
cmds = [
  "rm -rf .venv",
  "poetry install --no-root --only main"
]

[phases.build]
cmds = []

[start]
cmd = "poetry run alembic upgrade heads && poetry run python scripts/post_deploy.py && poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
