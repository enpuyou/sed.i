# Pre-commit hooks for Content Queue project
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Root wrapper: ./scripts/pre-commit.sh install
# Root wrapper: ./scripts/pre-commit.sh run --all-files
# Backend pytest hook runs a fast smoke target by default.
# Run full backend suite manually: cd content-queue-backend && poetry run pytest tests/ -q --tb=line -p no:xdist

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: ^frontend/public/clips/
      - id: check-merge-conflict
      - id: detect-private-key

  # Python - Backend formatting
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        name: Format backend code with Black
        language_version: python3.11
        files: ^content-queue-backend/

  # Python - Backend linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: Lint backend with Ruff
        args: [--fix]
        files: ^content-queue-backend/(app|scripts)/
      - id: ruff-format
        name: Format backend with Ruff
        files: ^content-queue-backend/(app|scripts)/

  # Alembic single-head check — catches multiple heads before deploy breaks
  - repo: local
    hooks:
      - id: alembic-single-head
        name: Check alembic has a single head
        entry: ./scripts/check_alembic_single_head.sh
        language: system
        pass_filenames: false
        files: ^content-queue-backend/alembic/
        stages: [pre-commit]

  # poetry.lock sync check — catches pyproject.toml/lock drift that breaks Railway install
  - repo: local
    hooks:
      - id: poetry-lock-check
        name: Check poetry.lock is consistent with pyproject.toml
        entry: bash -c 'cd content-queue-backend && poetry check --lock --quiet'
        language: system
        pass_filenames: false
        files: ^content-queue-backend/(pyproject\.toml|poetry\.lock)$
        stages: [pre-commit]

  # Backend tests
  - repo: local
    hooks:
      - id: pytest-backend
        name: Run backend tests
        entry: ./scripts/run_backend_pytest_precommit.sh
        language: system
        pass_filenames: false
        files: ^content-queue-backend/.*\.py$
        stages: [pre-commit]

  # Frontend - Prettier formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format frontend with Prettier
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, json, css, markdown]

  # Frontend linting and tests
  - repo: local
    hooks:
      - id: eslint-frontend
        name: Lint frontend with ESLint
        entry: bash -c 'cd frontend && npm run lint -- --max-warnings=0'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        stages: [pre-commit]

      - id: jest-frontend
        name: Run frontend tests
        entry: bash -c 'cd frontend && npm test -- --passWithNoTests --watchAll=false'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        stages: [pre-commit]
