<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sed.i</title>
  <link rel="icon" type="image/png" href="../icons/icon16.png" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <!-- Login view -->
  <div id="view-login" class="view hidden">
    <div class="logo-row" id="login-logo-row">
      <svg viewBox="0 0 100 100" width="28" height="28" class="logo-mark" aria-hidden="true">
        <path
          d="M52,3 C71,0 86,11 93,26 C101,42 98,58 92,71 C84,86 70,97 53,98 C37,99 22,92 13,79 C4,66 0,49 5,34 C10,18 26,5 42,2 C46,1 49,2 52,3Z"
          fill="currentColor" />
      </svg>
      <span class="logo">sed.i</span>
    </div>
    <p class="tagline">curate. read. listen.</p>

    <!-- Dev mode: revealed by long-pressing the logo on the login screen -->
    <div id="login-dev-fields" class="drawer hidden">
      <div class="field">
        <label for="input-login-api-url">api url</label>
        <input id="input-login-api-url" type="url" placeholder="https://api.sedi.read" />
      </div>
      <div class="drawer-actions">
        <button type="button" id="btn-login-save-api-url" class="btn-secondary">Save</button>
        <button type="button" id="btn-login-reset-api-url" class="btn-secondary">Reset</button>
      </div>
      <div id="login-api-url-feedback" class="hint hidden"></div>
    </div>

    <form id="form-login">
      <div class="field">
        <label for="input-email">email</label>
        <input id="input-email" type="email" autocomplete="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="input-password">password</label>
        <input id="input-password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      </div>
      <div id="login-error" class="error hidden"></div>
      <button type="submit" id="btn-login" class="btn-primary">Connect</button>
    </form>
  </div>

  <!-- Ready view -->
  <div id="view-ready" class="view hidden">
    <div class="header-row">
      <div class="logo-row">
        <svg viewBox="0 0 100 100" width="18" height="18" class="logo-mark" aria-hidden="true">
          <path
            d="M52,3 C71,0 86,11 93,26 C101,42 98,58 92,71 C84,86 70,97 53,98 C37,99 22,92 13,79 C4,66 0,49 5,34 C10,18 26,5 42,2 C46,1 49,2 52,3Z"
            fill="currentColor" />
        </svg>
        <span class="logo-small">sed.i</span>
      </div>
      <div class="header-actions">
        <button id="btn-settings-toggle" class="icon-btn" title="Settings">⚙</button>
        <button id="btn-close" class="icon-btn" title="Close">×</button>
      </div>
    </div>

    <!-- Settings drawer -->
    <div id="settings-drawer" class="drawer hidden">
      <!-- Dev mode: revealed by long-pressing the logo -->
      <div id="dev-fields" class="hidden">
        <div class="field">
          <label for="input-api-url">api url</label>
          <input id="input-api-url" type="url" placeholder="https://api.sedi.read" />
        </div>
        <div class="drawer-actions">
          <button id="btn-save-api-url" class="btn-secondary">Save</button>
          <button id="btn-reset-api-url" class="btn-secondary">Reset</button>
        </div>
        <div id="api-url-feedback" class="hint hidden"></div>
        <hr class="dev-divider" />
      </div>
      <div class="setting-row">
        <span class="setting-label">theme</span>
        <div class="theme-toggle-row">
          <button id="btn-theme-light" class="theme-btn active" data-theme="light">light</button>
          <button id="btn-theme-dark" class="theme-btn" data-theme="dark">dark</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">account</span>
        <button id="btn-logout" class="theme-btn disconnect-btn">disconnect</button>
      </div>
    </div>

    <img id="page-thumbnail" class="page-thumbnail hidden" src="" alt="" />

    <div class="page-info">
      <div id="page-source" class="page-source hidden">
        <img id="page-favicon" class="favicon" src="" alt="" />
        <span id="page-domain"></span>
      </div>
      <span id="page-title" class="page-title"></span>
      <p id="page-desc" class="page-desc hidden"></p>
      <div class="page-byline">
        <span id="page-author" class="page-author hidden"></span>
        <span id="page-date" class="page-date hidden"></span>
      </div>
    </div>

    <div id="save-error" class="error hidden"></div>

    <div class="action-row">
      <button id="btn-read" class="btn-secondary">Read</button>
      <button id="btn-save" class="btn-primary">Save to sed.i</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
