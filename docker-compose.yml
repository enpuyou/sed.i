version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: content_queue_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_queue
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: content_queue_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Prefect server (Layer 8) ─────────────────────────────────────────────
  # Optional: run `docker compose --profile prefect up` to start the Prefect UI.
  # Not needed for normal dev — only required when PREFECT_ENABLED=true.
  # UI available at http://localhost:4200
  prefect-server:
    image: prefecthq/prefect:3-python3.11
    container_name: sedi_prefect_server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_UI_URL: http://localhost:4200
      PREFECT_API_URL: http://localhost:4200/api
    profiles:
      - prefect

volumes:
  postgres_data:
  redis_data:
